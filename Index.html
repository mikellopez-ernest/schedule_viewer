<!doctype html>
<html lang="en">
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      :root {
        --bg: #f6f7f9;
        --surface: #ffffff;
        --text: #1f2933;
        --muted: #667085;
        --line: #d8dee8;
        --header: #eef2f7;
        --accent: #1769aa;
        --accent-strong: #0f4f87;
        --subject-bg: #edf7f6;
        --subject-line: #7fc7bd;
        --guard-bg: #fff4e5;
        --guard-line: #f59f00;
        --meeting-bg: #eef6ff;
        --meeting-line: #4dabf7;
        --tut-bg: #fff0f6;
        --tut-line: #f06595;
        --shadow: 0 12px 32px rgba(16, 24, 40, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
        font-size: 14px;
        line-height: 1.35;
      }

      .app {
        width: min(1480px, 100%);
        margin: 0 auto;
        padding: 20px;
      }

      .topbar {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .status {
        color: var(--muted);
        font-size: 13px;
        text-align: right;
      }

      .filters {
        display: grid;
        grid-template-columns: repeat(3, minmax(180px, 1fr)) auto;
        gap: 12px;
        align-items: end;
        margin-bottom: 18px;
      }

      label {
        display: grid;
        gap: 5px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      label[hidden] {
        display: none;
      }

      select,
      button {
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface);
        color: var(--text);
        font: inherit;
      }

      select {
        width: 100%;
        padding: 0 10px;
      }

      button {
        padding: 0 14px;
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-strong);
      }

      .schedule-wrap {
        overflow-x: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      table {
        width: 100%;
        min-width: 920px;
        border-collapse: collapse;
        table-layout: fixed;
      }

      th,
      td {
        border: 1px solid var(--line);
        vertical-align: top;
      }

      th {
        background: var(--header);
        padding: 10px;
        font-size: 13px;
        text-align: left;
      }

      th.slot-head,
      td.slot {
        width: 76px;
        text-align: center;
      }

      td {
        height: 104px;
        padding: 8px;
        vertical-align: middle;
      }

      td.slot {
        background: #fafbfc;
        color: var(--muted);
        font-weight: 700;
        vertical-align: middle;
      }

      .cell-items {
        display: grid;
        gap: 7px;
        align-content: center;
        min-height: 100%;
      }

      .item {
        display: grid;
        gap: 2px;
        padding: 7px;
        border-left: 4px solid var(--subject-line);
        border-radius: 6px;
        background: var(--subject-bg);
        overflow-wrap: anywhere;
      }

      .item.guard {
        border-left-color: var(--guard-line);
        background: var(--guard-bg);
      }

      .item.meeting {
        border-left-color: var(--meeting-line);
        background: var(--meeting-bg);
      }

      .item.tut {
        border-left-color: var(--tut-line);
        background: var(--tut-bg);
      }

      .subject {
        font-weight: 800;
        color: #134e4a;
      }

      .meta {
        color: #344054;
        font-size: 12px;
      }

      .empty {
        color: #98a2b3;
        font-size: 12px;
      }

      .floating-action {
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 10;
        box-shadow: var(--shadow);
      }

      .floating-action[hidden],
      .modal-backdrop[hidden] {
        display: none;
      }

      button:disabled {
        border-color: #b8c2d0;
        background: #c8d0dc;
        color: #667085;
        cursor: not-allowed;
      }

      button:disabled:hover {
        background: #c8d0dc;
      }

      .print-title {
        display: none;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        padding: 16px;
        background: rgba(31, 41, 51, 0.48);
      }

      .modal {
        width: min(460px, 100%);
        padding: 20px;
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .modal h2 {
        margin: 0 0 16px;
        font-size: 20px;
        letter-spacing: 0;
      }

      .modal-field {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }

      input[type="file"] {
        width: 100%;
        color: var(--text);
      }

      .checkbox-row {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        margin: 14px 0;
        color: var(--text);
        font-size: 14px;
        font-weight: 400;
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 18px;
      }

      .secondary-button {
        border-color: var(--line);
        background: var(--surface);
        color: var(--text);
      }

      .secondary-button:hover {
        background: #eef2f7;
      }

      .upload-status {
        min-height: 18px;
        color: var(--muted);
        font-size: 13px;
      }

      .upload-status.error {
        color: #b42318;
      }

      @media (max-width: 860px) {
        .app {
          padding: 12px;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .status {
          text-align: left;
        }

        .filters {
          grid-template-columns: 1fr 1fr;
        }

        .filters button {
          grid-column: 1 / -1;
        }
      }

      @media (max-width: 540px) {
        h1 {
          font-size: 20px;
        }

        .filters {
          grid-template-columns: 1fr;
        }

        table {
          min-width: 760px;
        }

        .floating-action {
          right: 12px;
          bottom: 12px;
        }
      }

      @media print {
        @page {
          size: A4 landscape;
          margin: 10mm;
        }

        * {
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }

        body {
          background: #ffffff;
          font-size: 10px;
        }

        .app {
          width: 100%;
          padding: 0;
        }

        .topbar,
        .filters,
        .floating-action,
        .modal-backdrop {
          display: none !important;
        }

        .print-title {
          display: block;
          margin: 0 0 8px;
          font-size: 18px;
          font-weight: 800;
          color: #1f2933;
        }

        .schedule-wrap {
          overflow: visible;
          border: none;
          border-radius: 0;
          box-shadow: none;
        }

        table {
          width: 100%;
          min-width: 0;
          table-layout: fixed;
        }

        tr.print-empty-row {
          display: none;
        }

        th {
          padding: 5px;
          font-size: 10px;
        }

        td {
          height: auto;
          min-height: 52px;
          padding: 4px;
        }

        th.slot-head,
        td.slot {
          width: 42px;
        }

        .cell-items {
          gap: 4px;
        }

        .item {
          gap: 1px;
          padding: 4px;
          border-left-width: 3px;
          border-radius: 4px;
        }

        .subject,
        .meta {
          font-size: 9px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div>
          <h1>Schedule Viewer</h1>
        </div>
        <div id="status" class="status"></div>
      </header>

      <section class="filters" aria-label="Schedule filters">
        <label>
          Teacher
          <select id="teacherFilter" data-filter-key="teacherAlias">
            <option value="">All teachers</option>
          </select>
        </label>
        <label>
          Group
          <select id="groupFilter" data-filter-key="group">
            <option value="">All groups</option>
          </select>
        </label>
        <label>
          Classroom
          <select id="classroomFilter" data-filter-key="classroom">
            <option value="">All classrooms</option>
          </select>
        </label>
        <label hidden>
          Subject
          <select id="subjectFilter" data-filter-key="subject">
            <option value="">All subjects</option>
          </select>
        </label>
        <button id="resetButton" type="button">Clear</button>
      </section>

      <main class="schedule-wrap" aria-label="Schedule table">
        <h2 id="printTitle" class="print-title"></h2>
        <table>
          <thead id="scheduleHead"></thead>
          <tbody id="scheduleBody"></tbody>
        </table>
      </main>
    </div>

    <button id="adminUploadButton" class="floating-action" type="button" hidden>
      CARREGAR HORARI
    </button>

    <button id="printButton" class="floating-action" type="button" hidden disabled>
      PRINT
    </button>

    <div id="uploadModal" class="modal-backdrop" hidden role="dialog" aria-modal="true" aria-labelledby="uploadTitle">
      <section class="modal">
        <h2 id="uploadTitle">Carregar horari</h2>
        <div class="modal-field">
          <label for="scheduleFileInput">GPU001.txt</label>
          <input id="scheduleFileInput" type="file" accept=".txt">
        </div>
        <label class="checkbox-row">
          <input id="notifyUsersInput" type="checkbox">
          <span>Notificar usuaris d'aquesta actualització.</span>
        </label>
        <div id="uploadStatus" class="upload-status" aria-live="polite"></div>
        <div class="modal-actions">
          <button id="cancelUploadButton" class="secondary-button" type="button">CANCEL</button>
          <button id="confirmUploadButton" type="button">OK</button>
        </div>
      </section>
    </div>

    <script>
      const APP_DATA = <?!= bootstrapJson ?>;
      const REQUIRED_UPLOAD_FILENAME = 'GPU001.txt';
      const REQUIRED_UPLOAD_FILENAME_KEY = REQUIRED_UPLOAD_FILENAME.toUpperCase();
      const SCHEDULE_UPLOAD_ENCODING = 'ISO-8859-1';
      const MEETING_SUBJECT_CODES = new Set([
        'RC_ESO',
        'RC_FP_BAT',
        'RDEP',
        'RDIM1',
        'RDIM2',
        'RDIR',
        'REAP',
        'REC',
        'CARREC',
      ]);

      const selects = [
        document.getElementById('teacherFilter'),
        document.getElementById('groupFilter'),
        document.getElementById('classroomFilter'),
        document.getElementById('subjectFilter'),
      ];

      const scheduleHead = document.getElementById('scheduleHead');
      const scheduleBody = document.getElementById('scheduleBody');
      const statusEl = document.getElementById('status');
      const resetButton = document.getElementById('resetButton');
      const adminUploadButton = document.getElementById('adminUploadButton');
      const printButton = document.getElementById('printButton');
      const printTitle = document.getElementById('printTitle');
      const defaultDocumentTitle = document.title;
      const uploadModal = document.getElementById('uploadModal');
      const scheduleFileInput = document.getElementById('scheduleFileInput');
      const notifyUsersInput = document.getElementById('notifyUsersInput');
      const uploadStatus = document.getElementById('uploadStatus');
      const cancelUploadButton = document.getElementById('cancelUploadButton');
      const confirmUploadButton = document.getElementById('confirmUploadButton');

      const filterOptionMap = {
        teacherFilter: APP_DATA.filters.teachers,
        groupFilter: APP_DATA.filters.groups,
        classroomFilter: APP_DATA.filters.classrooms,
        subjectFilter: APP_DATA.filters.subjects,
      };

      init();

      function init() {
        populateSelects();
        renderHeader();
        bindEvents();
        initAdminUpload();
        initPrint();
        renderSchedule();
      }

      function populateSelects() {
        selects.forEach(function(select) {
          const options = filterOptionMap[select.id] || [];
          options.forEach(function(option) {
            const optionEl = document.createElement('option');
            optionEl.value = option.value;
            optionEl.textContent = option.label;
            select.appendChild(optionEl);
          });
        });
      }

      function bindEvents() {
        selects.forEach(function(select) {
          select.addEventListener('change', function(event) {
            if (event.target.value) {
              resetOtherSelects(event.target);
            }
            renderSchedule();
          });
        });

        resetButton.addEventListener('click', function() {
          selects.forEach(function(select) {
            select.value = '';
          });
          renderSchedule();
        });
      }

      function initPrint() {
        if (APP_DATA.user && APP_DATA.user.isAdmin) {
          return;
        }

        printButton.hidden = false;
        printButton.addEventListener('click', printCurrentSchedule);
      }

      function initAdminUpload() {
        if (!APP_DATA.user || !APP_DATA.user.isAdmin) {
          return;
        }

        adminUploadButton.hidden = false;
        adminUploadButton.addEventListener('click', openUploadModal);
        cancelUploadButton.addEventListener('click', closeUploadModal);
        uploadModal.addEventListener('click', function(event) {
          if (event.target === uploadModal) {
            closeUploadModal();
          }
        });
        scheduleFileInput.addEventListener('change', validateSelectedFile);
        confirmUploadButton.addEventListener('click', submitScheduleUpload);
      }

      function openUploadModal() {
        scheduleFileInput.value = '';
        notifyUsersInput.checked = false;
        setUploadStatus('');
        setUploadBusy(false);
        uploadModal.hidden = false;
      }

      function closeUploadModal() {
        if (confirmUploadButton.disabled) {
          return;
        }

        uploadModal.hidden = true;
      }

      function validateSelectedFile() {
        const file = scheduleFileInput.files[0];

        if (!file) {
          setUploadStatus('');
          return false;
        }

        if (file.name.toUpperCase() !== REQUIRED_UPLOAD_FILENAME_KEY) {
          setUploadStatus('El fitxer ha de dir-se ' + REQUIRED_UPLOAD_FILENAME + ', sense importar majúscules o minúscules.', true);
          return false;
        }

        setUploadStatus('');
        return true;
      }

      function submitScheduleUpload() {
        const file = scheduleFileInput.files[0];

        if (!file) {
          setUploadStatus('Selecciona el fitxer ' + REQUIRED_UPLOAD_FILENAME + '.', true);
          return;
        }

        if (!validateSelectedFile()) {
          return;
        }

        setUploadBusy(true);
        setUploadStatus('Carregant el fitxer...');

        const reader = new FileReader();
        reader.onload = function(event) {
          google.script.run
            .withSuccessHandler(function(result) {
              setUploadStatus('Horari actualitzat: ' + result.rows + ' files.');
              window.setTimeout(function() {
                reloadMainPage(result.reloadUrl);
              }, 900);
            })
            .withFailureHandler(function(error) {
              setUploadBusy(false);
              setUploadStatus(error && error.message ? error.message : 'No s\'ha pogut carregar el fitxer.', true);
            })
            .uploadScheduleFile({
              filename: file.name,
              content: event.target.result,
              notify: notifyUsersInput.checked,
            });
        };
        reader.onerror = function() {
          setUploadBusy(false);
          setUploadStatus('No s\'ha pogut llegir el fitxer seleccionat.', true);
        };
        reader.readAsText(file, SCHEDULE_UPLOAD_ENCODING);
      }

      function reloadMainPage(reloadUrl) {
        if (reloadUrl) {
          window.open(reloadUrl, '_top');
          return;
        }

        window.location.href = window.location.href;
      }

      function setUploadBusy(isBusy) {
        confirmUploadButton.disabled = isBusy;
        cancelUploadButton.disabled = isBusy;
        scheduleFileInput.disabled = isBusy;
        notifyUsersInput.disabled = isBusy;
      }

      function setUploadStatus(message, isError) {
        uploadStatus.textContent = message;
        uploadStatus.classList.toggle('error', Boolean(isError));
      }

      function resetOtherSelects(activeSelect) {
        selects.forEach(function(select) {
          if (select !== activeSelect) {
            select.value = '';
          }
        });
      }

      function renderHeader() {
        const row = document.createElement('tr');
        const slotHead = document.createElement('th');
        slotHead.className = 'slot-head';
        slotHead.textContent = 'Slot';
        row.appendChild(slotHead);

        APP_DATA.days.forEach(function(day) {
          const th = document.createElement('th');
          th.textContent = day.label;
          row.appendChild(th);
        });

        scheduleHead.replaceChildren(row);
      }

      function renderSchedule() {
        const activeFilter = getActiveFilter();
        const rows = filterRows(activeFilter);
        const grid = groupRowsBySlotAndDay(rows);
        const fragment = document.createDocumentFragment();

        APP_DATA.slots.forEach(function(slot) {
          const tr = document.createElement('tr');
          let rowHasItems = false;
          const slotCell = document.createElement('td');
          slotCell.className = 'slot';
          slotCell.textContent = slot;
          tr.appendChild(slotCell);

          APP_DATA.days.forEach(function(day) {
            const td = document.createElement('td');
            const cellItems = grid[slot + '-' + day.value] || [];
            if (cellItems.length) {
              rowHasItems = true;
            }
            renderCellItems(td, cellItems, activeFilter);
            tr.appendChild(td);
          });

          tr.classList.toggle('print-empty-row', !rowHasItems);
          fragment.appendChild(tr);
        });

        scheduleBody.replaceChildren(fragment);
        updateStatus(activeFilter, rows.length);
        updatePrintState(activeFilter);
      }

      function getActiveFilter() {
        const selected = selects.find(function(select) {
          return select.value;
        });

        if (!selected) {
          return null;
        }

        return {
          key: selected.dataset.filterKey,
          value: selected.value,
          label: selected.options[selected.selectedIndex].text,
        };
      }

      function filterRows(activeFilter) {
        if (!activeFilter) {
          return [];
        }

        return APP_DATA.scheduleRows.filter(function(row) {
          return row[activeFilter.key] === activeFilter.value;
        });
      }

      function groupRowsBySlotAndDay(rows) {
        return rows.reduce(function(grid, row) {
          const key = row.slotNumber + '-' + row.dayNumber;
          if (!grid[key]) {
            grid[key] = [];
          }
          grid[key].push(row);
          return grid;
        }, {});
      }

      function renderCellItems(cell, items, activeFilter) {
        if (!items.length) {
          return;
        }

        const wrapper = document.createElement('div');
        wrapper.className = 'cell-items';

        groupScheduleItems(items, activeFilter).forEach(function(item) {
          const itemEl = document.createElement('div');
          itemEl.className = 'item ' + item.colorClass;
          renderScheduleItem(itemEl, item);
          wrapper.appendChild(itemEl);
        });

        cell.appendChild(wrapper);
      }

      function groupScheduleItems(items, activeFilter) {
        const schema = getCellSchema(activeFilter);
        const grouped = new Map();

        items.forEach(function(item) {
          const display = buildCellDisplay(item, schema);
          const key = display.keyParts.join('\u001f');

          if (!grouped.has(key)) {
            grouped.set(key, {
              title: display.title,
              line1Values: [],
              line1Set: new Set(),
              line2Values: [],
              line2Set: new Set(),
              line1Prefix: display.line1Prefix,
              line2Prefix: display.line2Prefix,
              colorClass: display.colorClass,
            });
          }

          const groupedItem = grouped.get(key);

          display.line1Values.forEach(function(value) {
            if (value && !groupedItem.line1Set.has(value)) {
              groupedItem.line1Set.add(value);
              groupedItem.line1Values.push(value);
            }
          });

          display.line2Values.forEach(function(value) {
            if (value && !groupedItem.line2Set.has(value)) {
              groupedItem.line2Set.add(value);
              groupedItem.line2Values.push(value);
            }
          });
        });

        return Array.from(grouped.values());
      }

      function getCellSchema(activeFilter) {
        if (!activeFilter) {
          return {
            title: 'subject',
            line1: 'group',
            line2: 'classroom',
            line1Prefix: '',
            line2Prefix: '',
            keyFields: ['subject', 'classroom'],
          };
        }

        if (activeFilter.key === 'teacherAlias') {
          return {
            title: 'subject',
            line1: 'group',
            line2: 'classroom',
            line1Prefix: 'Grup: ',
            line2Prefix: 'Classe: ',
            keyFields: ['subject', 'classroom'],
          };
        }

        if (activeFilter.key === 'group') {
          return {
            title: 'subject',
            line1: 'teacher',
            line2: 'classroom',
            line1Prefix: '',
            line2Prefix: 'Classe: ',
            keyFields: ['subject'],
          };
        }

        if (activeFilter.key === 'classroom') {
          return {
            title: 'subject',
            line1: 'teacher',
            line2: 'group',
            line1Prefix: '',
            line2Prefix: 'Grup: ',
            keyFields: ['subject'],
          };
        }

        if (activeFilter.key === 'subject') {
          return {
            title: 'teacher',
            line1: 'group',
            line2: 'classroom',
            line1Prefix: '',
            line2Prefix: '',
            keyFields: ['teacher', 'classroom'],
          };
        }

        return {
          title: 'subject',
          line1: 'group',
          line2: 'classroom',
          line1Prefix: '',
          line2Prefix: '',
          keyFields: ['subject', 'classroom'],
        };
      }

      function buildCellDisplay(item, schema) {
        return {
          title: getDisplayField(item, schema.title) || 'No subject',
          line1Values: toDisplayValues(getDisplayField(item, schema.line1)),
          line2Values: toDisplayValues(getDisplayField(item, schema.line2)),
          line1Prefix: schema.line1Prefix || '',
          line2Prefix: schema.line2Prefix || '',
          colorClass: getSubjectColorClass(item.subjectCode || item.subject),
          keyParts: schema.keyFields.map(function(field) {
            return getDisplayField(item, field) || '';
          }),
        };
      }

      function getDisplayField(item, field) {
        if (field === 'subject') {
          return item.subjectName || item.subject;
        }

        if (field === 'group') {
          return item.group;
        }

        if (field === 'teacher') {
          return item.teacherName || item.teacherAlias;
        }

        if (field === 'classroom') {
          return item.classroom;
        }

        return '';
      }

      function toDisplayValues(value) {
        if (!value) {
          return [];
        }

        if (Array.isArray(value)) {
          return value.filter(Boolean);
        }

        return [value];
      }

      function renderScheduleItem(parent, item) {
        appendLine(parent, item.title || 'No subject', 'subject');
        appendOptionalLine(parent, item.line1Values.join(', '), 'meta', item.line1Prefix);
        appendOptionalLine(parent, item.line2Values.join(', '), 'meta', item.line2Prefix);
      }

      function appendLine(parent, text, className) {
        const line = document.createElement('div');
        line.className = className;
        line.textContent = text;
        parent.appendChild(line);
      }

      function appendOptionalLine(parent, text, className, prefix) {
        if (text) {
          appendLine(parent, (prefix || '') + text, className);
        }
      }

      function getSubjectColorClass(subjectCode) {
        const code = String(subjectCode || '').toUpperCase();

        if (code === 'GUARDIA') {
          return 'guard';
        }

        if (code === 'TUT') {
          return 'tut';
        }

        if (MEETING_SUBJECT_CODES.has(code)) {
          return 'meeting';
        }

        return 'normal';
      }

      function updateStatus(activeFilter, count) {
        if (!activeFilter) {
          statusEl.textContent = 'Select a filter';
          return;
        }

        statusEl.textContent = activeFilter.label + ' · ' + count + ' rows';
      }

      function updatePrintState(activeFilter) {
        if (printButton.hidden) {
          return;
        }

        printButton.disabled = !activeFilter;
        printTitle.textContent = activeFilter ? activeFilter.label : '';
      }

      function printCurrentSchedule() {
        const activeFilter = getActiveFilter();

        if (!activeFilter) {
          return;
        }

        printTitle.textContent = activeFilter.label;
        document.title = activeFilter.label;
        window.addEventListener('afterprint', restoreDocumentTitleAfterPrint, { once: true });
        window.print();
      }

      function restoreDocumentTitleAfterPrint() {
        document.title = defaultDocumentTitle;
      }
    </script>
  </body>
</html>
